schema_id: railway-ticket
name: 铁路电子客票
stage: stage_two_png_ability_pack
variants:
  - railway-electronic-ticket

match_rules:
  required_all:
    - 铁路电子客票
  required_any:
    - 电子客票号
    - 发票号码
    - 退票费
    - 票价
    - 乘车
  min_required_any: 1

fields:
  invoice_code:
    aliases: []
    required: false
  invoice_no:
    aliases:
      - 发票号码
    required: true
  invoice_date:
    aliases:
      - 开票日期
    required: true
  buyer_name:
    aliases:
      - 购买方名称
    required: false
  buyer_tax_id:
    aliases:
      - 统一社会信用代码
    required: false
  seller_name:
    aliases: []
    required: true
  seller_tax_id:
    aliases: []
    required: false
  invoice_type:
    aliases:
      - 电子发票（铁路电子客票）
      - 铁路电子客票
    required: true
  amount_total:
    aliases:
      - 票价
      - 退票费
    required: true
  tax_total:
    aliases: []
    required: true
  total_with_tax:
    aliases:
      - 票价
      - 退票费
    required: true

amount_checks:
  - amount_total_plus_tax_total_equals_total_with_tax
  - line_amount_plus_line_tax_amount_equals_line_total_with_tax
  - sum_line_amount_equals_amount_total
  - sum_line_tax_amount_equals_tax_total

line_table:
  required: true

output_defaults:
  seller_name: 中国铁路

