schema_id: metro-quota-invoice
name: 地铁定额发票
stage: stage_two_png_ability_pack
variants:
  - metro-quota-invoice

match_rules:
  required_all:
    - 地铁
    - 定额发票
  required_any:
    - 发票代码
    - 发票号码
    - 伍元
  min_required_any: 2

fields:
  invoice_code:
    aliases:
      - 发票代码
    required: true
  invoice_no:
    aliases:
      - 发票号码
    required: true
  invoice_date:
    aliases: []
    required: false
  buyer_name:
    aliases: []
    required: false
  buyer_tax_id:
    aliases: []
    required: false
  seller_name:
    aliases: []
    required: true
  seller_tax_id:
    aliases:
      - 统一社会信用代码
    required: false
  invoice_type:
    aliases:
      - 定额发票
    required: true
  amount_total:
    aliases: []
    required: true
  tax_total:
    aliases: []
    required: true
  total_with_tax:
    aliases: []
    required: true

amount_checks:
  - amount_total_plus_tax_total_equals_total_with_tax
  - line_amount_plus_line_tax_amount_equals_line_total_with_tax
  - sum_line_amount_equals_amount_total
  - sum_line_tax_amount_equals_tax_total

line_table:
  required: true
