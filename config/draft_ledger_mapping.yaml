target_sheet:
  default: 发票台账
fields:
  row_type:
    headers: [行类型]
    required: false
    create_if_missing: true
    insert_after: row_sequence
  row_sequence:
    headers: [序号]
    required: false
    value: row_number
  draft_row_id:
    headers: [草稿行ID]
    required: false
  run_id:
    headers: [运行批次]
    required: false
  source_file:
    headers: [来源文件, 文件名]
    required: true
  page_range:
    headers: [来源页码]
    required: false
  invoice_unit_id:
    headers: [发票单元ID]
    required: false
  invoice_key:
    headers: [发票键]
    required: false
  invoice_line_key:
    headers: [明细键]
    required: false
  line_no:
    headers: [明细行号]
    required: false
  processed_at:
    headers: [处理时间]
    required: true
  invoice_code:
    headers: [发票代码]
    required: false
  invoice_no:
    headers: [发票号码]
    required: true
  invoice_date:
    headers: [开票日期]
    required: true
  buyer_name:
    headers: [购买方名称]
    required: false
  buyer_tax_id:
    headers: [购买方税号]
    required: false
  seller_name:
    headers: [销售方名称]
    required: false
  seller_tax_id:
    headers: [销售方税号]
    required: false
  invoice_type:
    headers: [发票类型]
    required: false
  item_name:
    headers: [项目名称]
    required: false
  spec_model:
    headers: [规格型号]
    required: false
  unit:
    headers: [单位]
    required: false
  quantity:
    headers: [数量]
    required: false
  unit_price:
    headers: [单价]
    required: false
  line_amount:
    headers: [明细金额, 金额]
    required: false
  tax_rate:
    headers: [税率]
    required: false
  line_tax_amount:
    headers: [明细税额, 税额]
    required: false
  line_total_with_tax:
    headers: [明细价税合计, 价税合计]
    required: false
  invoice_amount_total:
    headers: [票面金额合计]
    required: false
  invoice_tax_total:
    headers: [票面税额合计]
    required: false
  invoice_total_with_tax:
    headers: [票面价税合计]
    required: false
  recognition_status:
    headers: [识别状态]
    required: true
  reconciliation_status:
    headers: [核对状态]
    required: false
    create_if_missing: true
  confidence:
    headers: [置信度]
    required: true
  remark:
    headers: [备注]
    required: false
  correction_status:
    headers: [修正状态]
    required: false
  correction_time:
    headers: [修正时间]
    required: false
  correction_remark:
    headers: [修正备注]
    required: false
